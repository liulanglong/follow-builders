name: Send Daily Digest Email

# 由 cron-job.org 定时打 workflow_dispatch 触发(北京 9:00)。
# 只用 cron-job.org 外部触发, 不用 GitHub schedule。
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉完整历史, 供后面 push 前 rebase
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate and send digest
        working-directory: scripts
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DELIVERY_EMAIL: ${{ secrets.DELIVERY_EMAIL }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          GLM_MODEL: ${{ vars.GLM_MODEL }}
        run: node digest-email.js
      # 落盘归档: 把 digest-email.js 写出的 digest/*.html + *.md commit 回仓库
      # 供本地电脑 git pull 拉取成品日报。无变更则跳过。
      - name: Archive and commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digest/*.html digest/*.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: archive digest [skip ci]"
          # push 前先 rebase 到远程最新, 避免运行期间 main 前进导致 push 被拒
          git pull --rebase origin main
          git push
